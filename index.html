<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statevo</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: white;
}

header {
    text-align: center;
    padding: 100px 20px 60px;
}

h1 {
    font-size: 50px;
    font-weight: 600;
}

.subtitle {
    font-size: 20px;
    color: #a1a1aa;
    margin-top: 10px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    padding: 40px 20px;
}

.card {
    background: #111;
    padding: 35px;
    border-radius: 20px;
    width: 320px;
    transition: 0.4s;
    border: 1px solid #1f1f1f;
}

.card:hover {
    transform: translateY(-10px);
    border-color: #38bdf8;
}

.card h2 {
    font-weight: 500;
}

.price {
    font-size: 35px;
    margin: 15px 0;
    color: #38bdf8;
}

ul {
    padding-left: 20px;
    line-height: 1.8;
    color: #d4d4d8;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    background: white;
    color: black;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}

footer {
    text-align: center;
    padding: 60px 20px;
}

.footer-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.small-btn {
    background: transparent;
    border: 1px solid #333;
    color: white;
}

.small-btn:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<header>
    <h1>Statevo</h1>
    <p class="subtitle">Ton business mérite un site</p>
</header>

<div class="container">

    <div class="card">
        <h2>💎 Offre Premium</h2>
        <p class="price">150€</p>
        <ul>
            <li>✔ Site professionnel</li>
            <li>✔ Paiement intégré</li>
            <li>✔ Réservation</li>
            <li>✔ Mise en ligne</li>
            <li>✔ Support 1 mois</li>
        </ul>
        <button onclick="whatsapp()">Réserver</button>
    </div>

    <div class="card">
        <h2>⚡ Offre Essentielle</h2>
        <p class="price">70€</p>
        <ul>
            <li>✔ Site professionnel</li>
            <li>✔ Design moderne</li>
            <li>❌ Paiement</li>
            <li>❌ Réservation</li>
        </ul>
        <button onclick="whatsapp()">Commander</button>
    </div>

</div>

<footer>
    <p>Contact rapide</p>
    <div class="footer-buttons">
        <button class="small-btn" onclick="email()">📧 Email</button>
        <button class="small-btn" onclick="whatsapp()">💬 WhatsApp</button>
    </div>
</footer>

<script>
function email() {
    window.location.href = "mailto:statevocontact@gmail.com?subject=Demande de site web";
}

function whatsapp() {
    window.open("https://wa.me/33767470378", "_blank");
}
</script>

</body>
</html>
